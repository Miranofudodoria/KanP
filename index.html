<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>トマトの自己紹介ゲーム</title>
  <style>
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: black;
      color: #00ff00;
      text-align: center;
    }
    #game {
      padding: 20px;
    }
    .box {
      border: 2px solid #00ff00;
      padding: 20px;
      margin: 20px auto;
      width: 60%;
      background: rgba(0,0,0,0.8);
    }
    button {
      background: black;
      color: #00ff00;
      border: 2px solid #00ff00;
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
    }
    button:hover {
      background: #00ff00;
      color: black;
    }
    #tomato {
      font-size: 50px;
    }
  </style>
</head>
<body>

<div id="game">
  <h1>🍅 トマト RPG 🍅</h1>
  <div class="box" id="text">
    トマトが あらわれた！
  </div>
  <div id="choices">
    <button onclick="talk()">はなす</button>
    <button onclick="profile()">しらべる</button>
    <button onclick="eat()">たべる</button>
  </div>
  <div id="tomato">🍅</div>
</div>

<script>
  function talk() {
    document.getElementById('text').innerText = 'トマト「こんにちは！ぼくはジューシーで元気いっぱい！」';
  }

  function profile() {
    document.getElementById('text').innerText = '名前：トマト\n原産地：南アメリカ\n好き：ピザ・パスタ・サラダ';
  }

  function eat() {
    document.getElementById('text').innerText = 'トマトは にげだした！\n（食べられたくない！）';
  }
</script>

</body>
</html>
